<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обо мне — Адинай</title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; 
            color: #444;
            line-height: 1.8; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center; 
            min-height: 100vh; 
        }

        
        .container {
            max-width: 750px;
            background: white;
            padding: 50px; 
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(173, 20, 87, 0.1); 
            text-align: center;
        }

        
        .profile-container {
            overflow: hidden; 
            border-radius: 15px; 
            display: inline-block; 
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            border: 4px solid #f8bbd0; 
        }

        .profile-pic {
            width: 350px; 
            height: 350px;
            object-fit: cover; 
            display: block; 
            transition: transform 0.4s ease-in-out; 
        }

        
        .profile-container:hover .profile-pic {
            transform: scale(1.08); 
        }

        /* Заголовок */
        h1 {
            color: #ad1457;
            font-size: 2.5em;
            margin-bottom: 15px;
            margin-top: 0;
        }

        
        .about-text {
            font-size: 1.15em;
            margin-bottom: 40px;
            text-align: justify; 
            color: #555;
            padding: 0 20px; 
        }

        /* Кнопка «Назад» */
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ad1457;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: #880e4f;
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(136, 14, 79, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-container">
        <img src="5443096532392547746.jpg" alt="Адинай" class="profile-pic">
    </div>
    
    <h1>Обо мне</h1>
    
    <p class="about-text">
        Здравствуйте! Меня зовут <strong>Адинай</strong>. Я родилась в Таласской области, 29 июля 2006 года в субботнее утро. Детство провела в Таласе, окончила школу там же, сейчас я на втором курсе. Учусь в КНАУ, на факультете ИИСиДО, кафедра Прикладная информатика в экономике.  
    </p>

    <a href="index.html" class="btn-back">← Вернуться к семье</a>
</div>

</body>
</html>
